name: IP do Servidor

on:
  workflow_dispatch:

jobs:
  check-ip:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Obter IP do Servidor
      run: |
        echo "=== IP do Servidor GitHub ==="
        echo "IP Público: $(curl -s ifconfig.me)"
        echo "Hostname: $(hostname)"
        chmod +x dns/cloudflare-sync.sh
        ./dns/cloudflare-sync.sh
