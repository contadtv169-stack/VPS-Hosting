<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel VPS - Login</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0a0a1a,#1a0a3e);
  color:#fff; min-height:100vh;
  display:flex; align-items:center; justify-content:center;
}
.login-box {
  background:rgba(26,26,62,0.9); backdrop-filter:blur(10px);
  border-radius:1rem; padding:3rem; width:380px;
  border:1px solid rgba(255,255,255,0.1);
  text-align:center;
}
.login-box h1 { font-size:1.8rem; margin-bottom:0.5rem; background:linear-gradient(45deg,#00d4ff,#7b2ff7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.login-box p { color:#8899aa; margin-bottom:2rem; font-size:0.9rem; }
.input-group { margin-bottom:1rem; text-align:left; }
.input-group label { display:block; margin-bottom:0.3rem; color:#8899aa; font-size:0.85rem; }
.input-group input {
  width:100%; padding:0.8rem 1rem; border-radius:0.5rem;
  border:1px solid #2a2a5e; background:#1a1a3e; color:#fff;
  font-size:1rem; outline:none; transition:border-color 0.3s;
}
.input-group input:focus { border-color:#7b2ff7; }
.btn {
  width:100%; padding:0.8rem; border-radius:0.5rem; border:none;
  background:#7b2ff7; color:#fff; font-size:1rem; cursor:pointer;
  transition:background 0.3s; font-weight:bold;
}
.btn:hover { background:#6a1fd6; }
.error { color:#ff4444; font-size:0.85rem; margin-top:0.5rem; display:none; }
.lock-icon { font-size:3rem; margin-bottom:1rem; }
</style>
</head>
<body>
<div class="login-box">
  <div class="lock-icon">🔐</div>
  <h1>Painel de Controle</h1>
  <p>Faça login para gerenciar sua VPS</p>
  <div class="input-group">
    <label>Usuário</label>
    <input type="text" id="username" placeholder="admin" value="admin">
  </div>
  <div class="input-group">
    <label>Senha</label>
    <input type="password" id="password" placeholder="Digite a senha">
  </div>
  <button class="btn" onclick="login()">Entrar</button>
  <div class="error" id="error">Usuário ou senha inválidos</div>
</div>
<script>
function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  })
  .then(r => r.json())
  .then(data => {
    if (data.token) {
      localStorage.setItem('token', data.token);
      window.location.href = '/painel/dashboard.html';
    } else {
      document.getElementById('error').style.display = 'block';
    }
  })
  .catch(() => {
    document.getElementById('error').style.display = 'block';
  });
}
document.getElementById('password').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
